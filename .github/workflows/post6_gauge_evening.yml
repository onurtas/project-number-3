name: "Post 6 — Gauge (22:00 UTC)"

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  gauge-evening:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate gauge
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          cd scripts
          python bist100_gauge.py

      - name: Post to X
        env:
          X_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          X_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: |
          cd scripts
          POST_JSON=$(ls gdelt_bq_results/bist100_gauge_*_post.json | head -1)
          echo "Posting: $POST_JSON"
          python twitter_poster.py "$POST_JSON" gauge

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gauge-evening-${{ github.run_number }}
          path: scripts/gdelt_bq_results/
          retention-days: 7
